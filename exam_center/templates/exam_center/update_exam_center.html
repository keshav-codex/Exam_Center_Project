{% extends "exam_center/base.html" %}

    {% block title %}
        Update Exam Center
    {% endblock %}

{% block navigation %}
    <div class="d-flex justify-content-end mb-4">
        <a
            href="{% url 'home' %}"
            class="btn btn-secondary me-2">
            Home
        </a>

        <a
            href="{% url 'view_exam_center' %}"
            class="btn btn-primary me-2">
            View Exam Centers
        </a>
    </div>
{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">
                Update Exam Center
            </h2>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="text-center mt-4">
                    <button
                        type="submit"
                        class="btn btn-success px-4">
                        Update
                    </button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
